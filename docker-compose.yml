version: "3.8"

services:
  backend:
    build: .
    container_name: social_backend
    ports:
      - "5000:5000"
      - "9229:9229"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongo
      - redis
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/social
      REDIS_URL: redis://redis:6379
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: social_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: social_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
